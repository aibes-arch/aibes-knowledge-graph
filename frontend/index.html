<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIBES Domain Graph Builder</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
    }
    header {
      background: #1a237e;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 1.4rem; }
    .container {
      display: grid;
      grid-template-columns: 360px 1fr 360px;
      gap: 1rem;
      padding: 1rem;
      height: calc(100vh - 64px);
    }
    .panel {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 1rem;
      overflow: auto;
    }
    .panel h2 { margin-top: 0; font-size: 1.1rem; color: #1a237e; }
    label { display: block; margin: 0.6rem 0 0.3rem; font-size: 0.9rem; }
    input, select, textarea, button {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    button {
      background: #1a237e;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 0.8rem;
    }
    button:hover { background: #283593; }
    button:disabled { background: #9fa8da; cursor: not-allowed; }
    .status {
      margin-top: 0.8rem;
      padding: 0.5rem;
      border-radius: 4px;
      background: #e8eaf6;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }
    #graph-container {
      position: relative;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    #graph-svg { width: 100%; height: 100%; }
    .node circle { stroke: #fff; stroke-width: 2px; cursor: pointer; }
    .node text { font-size: 12px; pointer-events: none; text-anchor: middle; }
    .link { stroke: #999; stroke-opacity: 0.6; }
    .link-label { font-size: 10px; fill: #666; text-anchor: middle; }
    .legend {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.95);
      padding: 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .chat-box { border-top: 1px solid #eee; margin-top: 1rem; padding-top: 1rem; }
    .chat-history {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    .msg { margin-bottom: 0.6rem; }
    .msg.user { text-align: right; color: #1a237e; }
    .msg.bot { text-align: left; color: #333; }
  </style>
</head>
<body>
  <header>
    <h1>AIBES Domain Graph Builder</h1>
    <span>知识图谱自动构建与 GraphRAG 平台</span>
  </header>

  <div class="container">
    <!-- Left: Upload & Pipeline -->
    <div class="panel">
      <h2>📄 文档处理</h2>
      <label>上传 PDF / Word / Markdown</label>
      <input type="file" id="file-input" accept=".pdf,.docx,.doc,.md,.txt" />
      <button id="btn-upload">1. 上传文档</button>
      <button id="btn-parse" disabled>2. 解析文本</button>
      <button id="btn-extract" disabled>3. 抽取知识</button>
      <button id="btn-write" disabled>4. 写入图谱</button>
      <div class="status" id="pipeline-status">等待上传...</div>

      <h2 style="margin-top:1.5rem;">🔍 图谱搜索</h2>
      <input type="text" id="search-input" placeholder="输入关键词，如：风机" />
      <button id="btn-search">搜索节点</button>
      <button id="btn-load-full" style="background:#546e7a;">加载全图</button>
    </div>

    <!-- Center: Graph Visualization -->
    <div id="graph-container">
      <svg id="graph-svg"></svg>
      <div class="legend" id="legend"></div>
    </div>

    <!-- Right: Chat & Details -->
    <div class="panel">
      <h2>💬 图谱问答</h2>
      <div class="chat-history" id="chat-history"></div>
      <input type="text" id="chat-input" placeholder="例如：风机故障如何处理？" />
      <button id="btn-chat">提问</button>

      <h2 style="margin-top:1.5rem;">📊 统计</h2>
      <div id="stats">实体数：- <br/>关系数：- <br/>文档数：-</div>

      <h2 style="margin-top:1.5rem;">ℹ️ 节点详情</h2>
      <pre id="node-detail" style="font-size:0.8rem;background:#f5f5f5;padding:0.5rem;border-radius:4px;max-height:200px;overflow:auto;">点击图谱节点查看详情</pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
